name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Run Tests
        run: go test ./... -v

      - name: Run Tests with Coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Show Coverage
        run: go tool cover -func=coverage.out
